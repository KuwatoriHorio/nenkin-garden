<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粘菌ガーデン — 対話デモ (WASM)</title>
<style>
  :root{--bg:#0b1220;--panel:#121b2e;--ink:#e8eef7;--muted:#9fb0c8;--accent:#38f0e0;--line:#233149;}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1000px 600px at 70% -10%,#16233c,#0b1220 60%);
    color:var(--ink);font-family:-apple-system,"Segoe UI","Noto Sans JP",Meiryo,sans-serif;line-height:1.6}
  .wrap{max-width:760px;margin:0 auto;padding:24px 16px 60px}
  h1{font-size:1.7rem;margin:.2em 0;background:linear-gradient(120deg,#38f0e0,#7cf698);
     -webkit-background-clip:text;background-clip:text;color:transparent}
  p.sub{color:var(--muted);margin:.2em 0 1em}
  .stage{display:flex;justify-content:center}
  canvas{background:#0b1e2d;border:1px solid var(--line);border-radius:12px;
    image-rendering:pixelated;width:min(520px,92vw);height:auto;aspect-ratio:1/1;cursor:crosshair;
    box-shadow:0 16px 48px rgba(0,0,0,.45)}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;margin:16px 0}
  button{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:9px;
    padding:8px 14px;font-weight:600;cursor:pointer;font-size:.92rem}
  button:hover{border-color:var(--accent)}
  button.primary{background:linear-gradient(120deg,#1b6f68,#245c37);border-color:#2b6}
  input[type=range]{accent-color:var(--accent)}
  .stat{color:var(--muted);font-size:.85rem;font-family:ui-monospace,Consolas,monospace}
  .hint{color:var(--muted);font-size:.86rem;text-align:center;margin-top:8px}
  a{color:var(--accent)}
  .legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;color:var(--muted);font-size:.8rem;margin-top:6px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:middle;margin-right:5px}
  .panel{border:1px dashed var(--line);border-radius:10px;padding:10px 14px;margin:14px auto 0;max-width:520px;
    display:flex;flex-direction:column;gap:8px;background:rgba(255,255,255,.02)}
  .panel-title{margin:0 0 2px;color:var(--muted);font-size:.8rem;font-weight:600;letter-spacing:.02em}
</style>
</head>
<body>
<div class="wrap">
  <h1>粘菌ガーデン — 対話デモ</h1>
  <p class="sub">決定論コアを WebAssembly で実行。<b>採餌モード</b>では群れがホーム（◇）に凝集して始まり、
    <b>離れた場所に砂糖を置く</b>と、まとまったまま触手を伸ばして探し当てます（伸び）。
    <b>砂糖を取り除く</b>と、養えなくなった触手が退縮します（縮み）。右クリックで砂糖を取り除きます。</p>

  <div class="stage"><canvas id="cv" width="96" height="96"></canvas></div>
  <div class="legend">
    <span><span class="dot" style="background:#eafcff;border-radius:50%"></span>エージェント</span>
    <span><span class="dot" style="background:#7cf698"></span>trail 網</span>
    <span><span class="dot" style="background:#ff5a5a;border-radius:50%"></span>砂糖源</span>
    <span><span class="dot" style="background:#ffe08a;border-radius:2px;transform:rotate(45deg)"></span>ホーム（採餌）</span>
    <span><span class="dot" style="background:#0b1e2d"></span>海</span>
  </div>

  <div class="bar">
    <button id="play" class="primary">⏸ 停止</button>
    <label class="stat">速度 <input id="speed" type="range" min="1" max="120" value="30"> <span id="spd">30</span>/s</label>
    <button id="reset">↺ リセット</button>
    <button id="forage" class="primary">🏠 採餌モード: ON</button>
    <button id="mode">🕸 グラフ表示</button>
    <button id="trail">🌫 trail表示: OFF</button>
    <label class="stat">seed <input id="seed" type="number" value="42" style="width:5em"></label>
  </div>
  <div class="bar stat">
    <span>tick: <b id="tick">0</b></span>
    <span>砂糖: <b id="sugars">0</b></span>
    <span>state_hash: <b id="hash">—</b></span>
  </div>

  <div class="panel">
    <p class="panel-title">🔧 開発用チューニング・パネル（プレイ動詞ではない・見え方確認用, render-005）</p>
    <label class="stat">砂糖の初期量 strength
      <input id="strength" type="range" min="50" max="1000" step="10" value="350">
      <span id="strengthVal">350</span>
    </label>
    <label class="stat">回収レート collect_rate（バイオマス増加量）
      <input id="collectRate" type="range" min="0.05" max="3" step="0.05" value="0.5">
      <span id="collectRateVal">0.50</span>
    </label>
  </div>

  <p class="hint">左クリック=砂糖を置く / 右クリック=取り除く &nbsp;·&nbsp;
    <a href="../index.html">← プロジェクトのトップへ</a></p>
</div>

<script type="module">
import init, { Sim } from './render_wasm.js';

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const off = document.createElement('canvas');       // グリッド解像度のオフスクリーン
let octx, wasm, sim, W, H;
let playing = true, speed = 30, acc = 0, last = 0;
let forage = true;                                   // 採餌モード（ホーム凝集＋コホージョン, core-002）
let mode = 'density';                                // 'density' | 'graph'
let showTrail = false;                               // trail(密度)表示トグル（render-005: 既定OFF・エージェント表示が既定）
let gcache = null, lastGraph = 0;                    // グラフ幾何のキャッシュ（throttle）
const SCALE = 6;                                     // canvas 内部解像度 = グリッド×SCALE
const REMOVE_RADIUS = 3.0;
// 開発用チューニング・パネルの値（render-005）。既定は core Params::default() と同じ見え方になる値。
let strength = 350.0, collectRate = 0.5;
const PALETTE = ['#7cf698','#38f0e0','#ffd166','#f78c6b','#c792ea','#89ddff','#a3be8c','#e0aaff'];

function fresh(seed){
  sim = forage ? Sim.new_forage(seed >>> 0) : new Sim(seed >>> 0);
  W = sim.width(); H = sim.height();
  off.width = W; off.height = H;
  octx = off.getContext('2d');
  cv.width = W * SCALE; cv.height = H * SCALE;
  gcache = null;
  sim.set_collect_rate(collectRate);   // チューニング・パネルの現在値をリセット後にも再適用（実行時setter）
}

// 密度バッファを（拡大して）描く。alpha<1 でグラフの下地にも使う。
// withTrail=false のときは land/sea 背景のみ（trail の緑グロウを描かない, render-005）。
function drawDensity(alpha, withTrail){
  sim.render(withTrail);
  const ptr = sim.pixels_ptr(), len = sim.pixels_len();
  const buf = new Uint8ClampedArray(wasm.memory.buffer, ptr, len); // 毎フレーム再取得
  octx.putImageData(new ImageData(new Uint8ClampedArray(buf), W, H), 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.globalAlpha = alpha;
  ctx.drawImage(off, 0, 0, W, H, 0, 0, cv.width, cv.height);
  ctx.globalAlpha = 1;
}

// エージェント（歩き手）を点で描く（render-005: state.ax/ay を読むだけ・非侵襲）。
function drawAgents(){
  const p = sim.agent_positions();
  ctx.fillStyle = '#eafcffdd';
  for(let i=0;i<p.length;i+=2){
    ctx.beginPath();
    ctx.arc(p[i]*SCALE, p[i+1]*SCALE, 1.5, 0, 6.2832);
    ctx.fill();
  }
}

// 採餌モードのホーム印（◇）を描く。
function drawHome(){
  if(!forage) return;
  const hx = sim.home_x()*SCALE, hy = sim.home_y()*SCALE;
  ctx.save();
  ctx.translate(hx, hy); ctx.rotate(Math.PI/4);
  ctx.fillStyle = '#ffe08a'; ctx.strokeStyle = '#7a5b12'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.rect(-5,-5,10,10); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawSugars(){
  const s = sim.sugar_positions();
  for(let i=0;i<s.length;i+=2){
    const terminal = (i===0 || i===s.length-2);
    ctx.beginPath(); ctx.arc(s[i]*SCALE, s[i+1]*SCALE, terminal?7:5, 0, 6.2832);
    ctx.fillStyle = '#ff5a5a'; ctx.fill();
    ctx.lineWidth = terminal?2.5:1.2; ctx.strokeStyle = '#fff'; ctx.stroke();
  }
  return s.length/2;
}

// グラフビュー: 密度を薄い下地に、ノード/エッジ（幹線=流量太さ, MST実線/冗長破線, 成分色）を描く。
function drawGraph(ts){
  drawDensity(0.22, showTrail);
  if(!gcache || ts - lastGraph > 150){          // グラフ再計算は throttle（決定性は同一State→同一幾何で担保）
    sim.compute_graph();
    gcache = {
      nodes: sim.graph_nodes(), edges: sim.graph_edges(),
      cur: sim.graph_edge_currents(), mst: sim.graph_edge_mst(),
      comp: sim.graph_edge_comp(), maxc: sim.graph_max_current(),
    };
    lastGraph = ts;
  }
  const {nodes,edges,cur,mst,comp,maxc} = gcache;
  for(let e=0;e<edges.length;e+=2){
    const a=edges[e], b=edges[e+1], ei=e/2;
    const w = maxc>1e-9 ? 1 + 5*(cur[ei]/maxc) : 1.2;   // 流量→線幅（render-002 と同じ写像）
    ctx.strokeStyle = PALETTE[comp[ei] % PALETTE.length];
    ctx.lineWidth = w;
    ctx.setLineDash(mst[ei] ? [] : [5,5]);
    ctx.globalAlpha = mst[ei] ? 0.95 : 0.7;
    ctx.beginPath();
    ctx.moveTo(nodes[a*2]*SCALE, nodes[a*2+1]*SCALE);
    ctx.lineTo(nodes[b*2]*SCALE, nodes[b*2+1]*SCALE);
    ctx.stroke();
  }
  ctx.setLineDash([]); ctx.globalAlpha = 1;
  ctx.fillStyle = '#0b1420'; ctx.strokeStyle = '#cfe3ff'; ctx.lineWidth = 1;
  for(let n=0;n<nodes.length;n+=2){
    ctx.beginPath(); ctx.arc(nodes[n]*SCALE, nodes[n+1]*SCALE, 2.6, 0, 6.2832); ctx.fill(); ctx.stroke();
  }
  return drawSugars();
}

function draw(ts){
  ctx.clearRect(0, 0, cv.width, cv.height);   // 毎フレームclear（グラフ下地の0.22が蓄積しないよう）
  // 背景（陸/海）＋trail(任意)は常にまず描く。エージェント点＋砂糖＋ホーム印は常に描く（render-005）。
  const sugars = (mode==='graph') ? drawGraph(ts) : (drawDensity(1.0, showTrail), drawSugars());
  drawAgents();
  drawHome();
  document.getElementById('tick').textContent = sim.tick();
  document.getElementById('sugars').textContent = sugars;
  document.getElementById('hash').textContent = sim.state_hash_hex();
}

function loop(ts){
  if(!last) last = ts;
  const dt = (ts - last)/1000; last = ts;
  if(playing){
    acc += dt * speed;
    let n = 0;
    while(acc >= 1 && n < 400){ sim.step(); acc -= 1; n++; }
    if(playing) gcache = null;   // 進んだらグラフ幾何は次フレームで再計算
  }
  draw(ts);
  requestAnimationFrame(loop);
}

function cellFromEvent(e){
  const r = cv.getBoundingClientRect();
  return { cx: e.clientX - r.left, cy: e.clientY - r.top, cw: r.width, ch: r.height };
}
cv.addEventListener('click', e=>{
  const {cx,cy,cw,ch} = cellFromEvent(e);
  sim.place_sugar_at_canvas(cx, cy, cw, ch, strength); gcache = null;
});
cv.addEventListener('contextmenu', e=>{
  e.preventDefault();
  const {cx,cy,cw,ch} = cellFromEvent(e);
  sim.remove_sugar_at_canvas(cx, cy, cw, ch, REMOVE_RADIUS); gcache = null;
});

document.getElementById('play').addEventListener('click', e=>{
  playing = !playing;
  e.target.textContent = playing ? '⏸ 停止' : '▶ 再生';
});
document.getElementById('speed').addEventListener('input', e=>{
  speed = +e.target.value; document.getElementById('spd').textContent = speed;
});
document.getElementById('reset').addEventListener('click', ()=>{
  fresh(+document.getElementById('seed').value || 0);
});
document.getElementById('forage').addEventListener('click', e=>{
  forage = !forage;
  e.target.textContent = forage ? '🏠 採餌モード: ON' : '🏠 採餌モード: OFF';
  fresh(+document.getElementById('seed').value || 42);   // モード切替はコロニー初期化から
});
document.getElementById('mode').addEventListener('click', e=>{
  mode = (mode==='graph') ? 'density' : 'graph';
  gcache = null;
  e.target.textContent = (mode==='graph') ? '🟢 密度表示' : '🕸 グラフ表示';
});
document.getElementById('trail').addEventListener('click', e=>{
  showTrail = !showTrail;
  e.target.textContent = showTrail ? '🌫 trail表示: ON' : '🌫 trail表示: OFF';
});
document.getElementById('strength').addEventListener('input', e=>{
  strength = +e.target.value;
  document.getElementById('strengthVal').textContent = strength;
});
document.getElementById('collectRate').addEventListener('input', e=>{
  collectRate = +e.target.value;
  document.getElementById('collectRateVal').textContent = collectRate.toFixed(2);
  if(sim) sim.set_collect_rate(collectRate);   // 実行中 Sim の params.collect_rate を実行時に変更（既定値は不変）
});

init().then(w=>{
  wasm = w;
  fresh(+document.getElementById('seed').value || 42);
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
